<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V.I.T.A.L AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>

<body>

<div class="chat-container">

<h1>V.I.T.A.L</h1>
<p class="subtitle">AI Health Intelligence System</p>

<div id="ChatArea" class="chat-box"></div>

<form id="chatForm">

<textarea id="message1" placeholder="Symptoms"></textarea>
<textarea id="message2" placeholder="Vitals (Heart rate, sleep etc.)"></textarea>
<textarea id="message3" placeholder="Facial indicators"></textarea>

<!-- Sleep -->
<select id="sleep_hours">
<option value="">Sleep Hours</option>
<option>&lt;5h</option>
<option>5–6h</option>
<option>6–7h</option>
<option>7–8h</option>
<option>8+ h</option>
</select>

<select id="sleep_quality">
<option value="">Sleep Quality</option>
<option>Poor</option>
<option>Average</option>
<option>Good</option>
</select>

<select id="wake_refreshed">
<option value="">Wake Refreshed?</option>
<option>Yes</option>
<option>No</option>
</select>

<!-- Exercise -->
<select id="exercise_freq">
<option value="">Exercise Frequency</option>
<option>0</option>
<option>1–2</option>
<option>3–4</option>
<option>5+</option>
</select>

<select id="exercise_type">
<option value="">Exercise Type</option>
<option>None</option>
<option>Strength</option>
<option>Cardio</option>
<option>Mixed</option>
</select>

<!-- Diet -->
<select id="diet_type">
<option value="">Diet Type</option>
<option>Vegetarian</option>
<option>Non-Veg</option>
<option>Vegan</option>
</select>

<select id="processed_food">
<option value="">Processed Food Intake</option>
<option>Low</option>
<option>Moderate</option>
<option>High</option>
</select>

<!-- Substances -->
<select id="alcohol">
<option value="">Alcohol</option>
<option>None</option>
<option>Social</option>
<option>Weekly</option>
<option>Heavy</option>
</select>

<select id="smoking">
<option value="">Smoking/Vaping</option>
<option>Never</option>
<option>Former</option>
<option>Current</option>
</select>

<select id="caffeine">
<option value="">Caffeine</option>
<option>0</option>
<option>1–2 cups</option>
<option>3–4</option>
<option>5+</option>
</select>

<div class="button-group">
<button type="submit" class="send-btn">Analyze</button>
<button type="button" id="clearChat" class="clear-btn">New Chat</button>
</div>

</form>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
