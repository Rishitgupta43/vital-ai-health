<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - VITAL AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Orbitron',sans-serif;
background: radial-gradient(circle at top,#0f2027,#203a43,#2c5364);
overflow:hidden;
}

body::before, body::after{
content:"";
position:absolute;
width:400px;
height:400px;
border-radius:50%;
filter:blur(120px);
z-index:0;
}
body::before{background:rgba(0,255,255,0.15);top:-100px;left:-100px;}
body::after{background:rgba(0,140,255,0.15);bottom:-100px;right:-100px;}

.login-box{
position:relative;
z-index:1;
width:320px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 25px rgba(0,255,255,0.3);
text-align:center;
}

h2{
color:#00f2ff;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
font-family:'Orbitron';
box-sizing:border-box;
}

input::placeholder{
color:#aaa;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00f2ff,#0066ff);
color:white;
cursor:pointer;
font-family:'Orbitron';
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00f2ff;
}

.link{
margin-top:15px;
color:#ccc;
font-size:12px;
}

a{
color:#00f2ff;
text-decoration:none;
}

/* Error message */
.error-msg {
background: rgba(255, 65, 108, 0.15);
border: 1px solid rgba(255, 65, 108, 0.4);
color: #ff7b9c;
padding: 10px;
border-radius: 10px;
font-size: 11px;
margin-bottom: 15px;
line-height: 1.5;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>⚡ VITAL LOGIN</h2>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input name="email" type="email" placeholder="Enter your Email" required>
        <button type="submit">Login</button>
    </form>

    <div class="link">
        New user? <a href="/signup">Create Account</a>
    </div>
</div>

</body>
</html>
