<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VITAL AI Setup</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
}

.container {
    width: 450px;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 30px rgba(0,255,255,0.3);
    color: white;
}

h1 {
    text-align: center;
    color: #00f2ff;
}

.question {
    margin-top: 14px;
    font-size: 13px;
}

select, input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

textarea {
    resize: none;
    height: 60px;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #00f2ff, #0066ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00f2ff;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 V.I.T.A.L Setup</h1>

<form method="POST">

<input type="text" name="name" placeholder="Enter your name" required>

<div class="question">
Country:
<input type="text" name="country" placeholder="e.g. India, USA" required>
</div>

<div class="question">
Do you have Heart Disease?
<select name="q1"><option>Yes</option><option>No</option></select>
</div>

<div class="question">
Do you have Diabetes?
<select name="q2"><option>Yes</option><option>No</option></select>
</div>

<div class="question">
Do you have High Blood Pressure?
<select name="q3"><option>Yes</option><option>No</option></select>
</div>

<div class="question">
Do you have Respiratory Issues (Asthma, etc.)?
<select name="q4"><option>Yes</option><option>No</option></select>
</div>

<div class="question">
Do you frequently experience Stress/Anxiety?
<select name="q5"><option>Yes</option><option>No</option></select>
</div>

<div class="question">
Mention any major health issue not listed:
<textarea name="custom_issue" placeholder="Optional..."></textarea>
</div>

<button type="submit">Initialize System</button>

</form>

</div>

</body>
</html>
